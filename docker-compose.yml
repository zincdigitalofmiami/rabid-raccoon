services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
      - .env.production.local
    environment:
      # Override DB URL to hit local Postgres directly — bypasses Accelerate 5s timeout
      LOCAL_DATABASE_URL: postgresql://zincdigital@host.docker.internal:5432/rabid_raccoon
    extra_hosts:
      - "host.docker.internal:host-gateway"

  inngest:
    image: inngest/inngest:latest
    restart: unless-stopped
    ports:
      - "8288:8288"
    command:
      - inngest
      - dev
      - --no-discovery
      - -u
      - http://app:3000/api/inngest
    depends_on:
      - app
